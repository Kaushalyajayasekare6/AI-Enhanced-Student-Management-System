<!DOCTYPE html>
<html>
<head>
    <title>Student Dropout Risk Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Student Dropout Risk Prediction System</h2>

    <form method="POST">
        <label>Attendance (%)</label>
        <input type="number" min="0" max="100" step="0.1" name="attendance" required>

        <label>Average Marks (%)</label>
        <input type="number" min="0" max="100" step="0.1" name="avg_marks" required>

        <label>Failed Subjects (0–6)</label>
        <input type="number" min="0" max="6" name="failed_subjects" required>

        <label>Assignment Submission (%)</label>
        <input type="number" min="0" max="100" step="0.1" name="assignment_rate" required>

        <button type="submit">Predict Risk</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h3>Prediction Result: {{ prediction }}</h3>

        <table>
            {% for key, value in input_data.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
    {% endif %}
</div>

</body>
</html>
